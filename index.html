<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>EDGE RUSH: an on-device AI game</title>
<style>
  :root{
    --bg:#0a0e1a; --panel:#121a2e; --ink:#e6ecff; --muted:#7e8bb0;
    --conv:#3ddc97; --attn:#ffb454; --cloud:#5aa9ff; --nano:#c78bff;
    --bad:#ff5d6c; --good:#3ddc97; --line:#23304f;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{
    background:radial-gradient(1200px 700px at 50% -10%, #15203a 0%, var(--bg) 60%);
    color:var(--ink); font-family:"SF Mono",ui-monospace,Menlo,Consolas,monospace;
    display:flex; align-items:center; justify-content:center; min-height:100%;
    -webkit-font-smoothing:antialiased; padding:16px;
  }
  #app{width:min(900px,100%)}
  h1{font-size:24px;margin:0;letter-spacing:1px}
  h1 small{color:var(--muted);font-weight:400;font-size:13px;letter-spacing:0}
  .card{position:relative;background:linear-gradient(180deg,#141d33,#0f1626);border:1px solid var(--line);
    border-radius:16px;padding:20px;box-shadow:0 20px 50px rgba(0,0,0,.45)}
  #help{position:absolute;top:16px;right:16px;width:30px;height:30px;padding:0;border-radius:50%;
    background:#0c1424;border:1px solid var(--line);color:var(--muted);font-weight:700;font-size:15px;
    display:none;align-items:center;justify-content:center;z-index:60}
  #help:hover{color:var(--ink);border-color:var(--cloud)}
  .muted{color:var(--muted)}
  .row{display:flex;gap:12px;flex-wrap:wrap}
  button{font-family:inherit;cursor:pointer;border:none;border-radius:12px;color:#06101f;
    font-weight:700;padding:14px 16px;font-size:15px;transition:transform .05s ease,filter .15s}
  button:active{transform:translateY(1px)}
  button:disabled{filter:grayscale(.7) brightness(.6);cursor:not-allowed}
  .btn-conv{background:var(--conv)} .btn-attn{background:var(--attn)}
  .btn-cloud{background:var(--cloud)} .btn-nano{background:var(--nano)}
  .btn-attn.hide,.btn-nano.hide{display:none}

  .topbar{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:6px}
  .stagetag{font-size:12px;color:var(--muted)}

  .meters{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin:14px 0}
  .meter{background:#0c1424;border:1px solid var(--line);border-radius:12px;padding:10px 12px}
  .meter.hide{display:none}
  .meter .lab{font-size:11px;color:var(--muted);display:flex;justify-content:space-between}
  .bar{height:9px;border-radius:6px;background:#1b2742;margin-top:8px;overflow:hidden}
  .bar > i{display:block;height:100%;width:50%;border-radius:6px;transition:width .25s}
  .meter.pulse{animation:pulse .35s ease}
  @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(255,180,84,0)}30%{box-shadow:0 0 0 3px rgba(255,180,84,.55)}100%{box-shadow:0 0 0 0 rgba(255,180,84,0)}}

  #specialist{font-size:12px;text-align:center;margin:-4px 0 10px;color:var(--nano);min-height:0;display:none}
  #specialist.show{display:block;min-height:16px}

  #stage{position:relative;height:500px;background:#0b1322;border:1px solid var(--line);
    border-radius:14px;overflow:hidden;margin:6px 0 14px}
  #queueline{position:absolute;left:0;right:0;top:0;height:100%}
  .req{position:absolute;left:50%;transform:translateX(-50%);width:80%;border-radius:12px;
    padding:12px 14px;border:1px solid var(--line);background:#13203a;
    box-shadow:0 10px 25px rgba(0,0,0,.4)}
  .req .top{display:flex;justify-content:space-between;align-items:center;font-size:13px}
  .req .type{font-weight:700;letter-spacing:.5px}
  .req .tags{display:flex;gap:6px;margin-top:8px;font-size:11px;color:var(--muted)}
  .chip{padding:2px 8px;border-radius:20px;border:1px solid var(--line);background:#0d1830}
  .chip.long{color:#ffd9a0;border-color:#5a4628}
  .chip.complex{color:#ffb0b8;border-color:#5a2c33}
  .chip.spec{color:#e0c4ff;border-color:#4b3a66}
  .timer{height:6px;border-radius:6px;background:#23304f;margin-top:10px;overflow:hidden}
  .timer > i{display:block;height:100%;background:var(--cloud)}
  #floats{position:absolute;inset:0;pointer-events:none}
  .float{position:absolute;font-weight:700;font-size:14px;animation:rise 1s ease-out forwards}
  @keyframes rise{from{opacity:1;transform:translateY(0)}to{opacity:0;transform:translateY(-40px)}}
  .banner{position:absolute;left:50%;top:8px;transform:translateX(-50%);background:#3a1620;
    color:#ffb0b8;border:1px solid #5a2c33;padding:6px 12px;border-radius:20px;font-size:12px;
    font-weight:700;letter-spacing:.5px}

  .keys{font-size:12px;color:var(--muted);margin-top:8px;text-align:center;min-height:16px}

  .overlay{position:absolute;inset:0;background:rgba(7,11,22,.95);display:flex;
    align-items:center;justify-content:flex-start;flex-direction:column;text-align:center;padding:34px 26px 26px;border-radius:14px;overflow:auto}
  .overlay h2{margin:0 0 10px;font-size:20px}
  .overlay .body{max-width:580px;font-size:13px;line-height:1.6;text-align:left}
  .overlay .body p{margin:6px 0}
  .overlay .body .lead{font-size:14px}
  .kbd{display:inline-block;padding:1px 7px;border-radius:6px;font-weight:700;color:#06101f;font-size:12px}
  .stat{font-size:13px;color:var(--muted);margin:3px 0}
  a{color:var(--cloud)}

  /* lesson takeaways (title screen) */
  .learn{max-width:520px;text-align:left;font-size:12.5px;line-height:1.5;margin:8px auto 0;color:var(--muted)}
  .learn ol{margin:5px 0 0;padding-left:20px}
  .learn li{margin:3px 0}
  .learn b{color:var(--ink);font-weight:700}

  /* architecture-mix bar (payoff) */
  .mixbar{display:flex;height:26px;border-radius:8px;overflow:hidden;margin:14px auto 6px;max-width:520px;border:1px solid var(--line);width:100%}
  .mixbar > span{display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#06101f;min-width:0;overflow:hidden;white-space:nowrap}
  .mixleg{display:flex;gap:14px;justify-content:center;font-size:11px;color:var(--muted);flex-wrap:wrap;margin-bottom:6px}
  .mixleg b{color:var(--ink)}
  .dot{display:inline-block;width:9px;height:9px;border-radius:50%;margin-right:4px;vertical-align:middle}

  /* build-your-chip choice cards (STAR) */
  .builds{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;max-width:620px;margin:10px auto 2px;width:100%}
  .build{background:#0c1424;border:1px solid var(--line);border-radius:12px;padding:14px;cursor:pointer;text-align:left;color:var(--ink)}
  .build:hover{border-color:var(--cloud)}
  .build h3{margin:0 0 6px;font-size:14px}
  .build p{margin:0;font-size:11.5px;color:var(--muted);line-height:1.5}
  @media (max-width:620px){.builds{grid-template-columns:1fr}.meters{grid-template-columns:1fr}}
</style>
</head>
<body>
<div id="app">
  <div class="card">
    <button id="help" title="Explain this lesson">?</button>
    <div class="topbar">
      <h1>EDGE RUSH <small>: you are the AI chip</small></h1>
      <div style="text-align:right">
        <div id="device" class="stagetag">Phone</div>
        <div id="stageInfo" class="stagetag"></div>
      </div>
    </div>

    <div class="meters">
      <div class="meter hide" id="batMeter">
        <div class="lab"><span id="batLab">BATTERY</span><span id="batTxt">100%</span></div>
        <div class="bar"><i id="batBar" style="background:var(--good)"></i></div>
      </div>
      <div class="meter hide" id="ramMeter">
        <div class="lab"><span id="ramLab">RAM (KV-cache)</span><span id="ramTxt">0 tok</span></div>
        <div class="bar"><i id="ramBar" style="background:var(--attn)"></i></div>
      </div>
      <div class="meter" id="accMeter">
        <div class="lab"><span id="accLab">ACCURACY</span><span id="accTxt">100%</span></div>
        <div class="bar"><i id="accBar" style="background:var(--cloud)"></i></div>
      </div>
    </div>

    <div id="specialist"></div>

    <div id="stage">
      <div id="queueline"></div>
      <div id="floats"></div>
      <div class="overlay" id="overlay"></div>
    </div>

    <div class="row" style="justify-content:center">
      <button class="btn-conv"  id="bConv">[1] FAST<br><small style="font-weight:400">on-device, cheap</small></button>
      <button class="btn-attn hide" id="bAttn">[2] ATTENTION<br><small style="font-weight:400">smart, eats RAM</small></button>
      <button class="btn-nano hide" id="bNano">[3] NANO<br><small style="font-weight:400">specialist, tiny</small></button>
      <button class="btn-cloud" id="bCloud">[4] CLOUD<br><small style="font-weight:400">perfect, needs signal</small></button>
    </div>
    <div class="keys" id="keys">Press the keys or click to route each request.</div>
  </div>
</div>

<script>
/* ================= helpers ================= */
const $ = id => document.getElementById(id);
const stageEl = $('queueline'), floats = $('floats'), overlay = $('overlay');
const clamp = (v,a,b)=>Math.max(a,Math.min(b,v));

/* persistent buttons + meters carry emojis during play, but stay plain on the
   title screen (where they sit behind the overlay). chromeLabels swaps them. */
function chromeLabels(emoji){
  $('bConv').innerHTML  = `[1] FAST${emoji?' ⚡':''}<br><small style="font-weight:400">on-device, cheap</small>`;
  $('bAttn').innerHTML  = `[2] ATTENTION${emoji?' 🧠':''}<br><small style="font-weight:400">smart, eats RAM</small>`;
  $('bNano').innerHTML  = `[3] NANO${emoji?' 🎯':''}<br><small style="font-weight:400">specialist, tiny</small>`;
  $('bCloud').innerHTML = `[4] CLOUD${emoji?' ☁️':''}<br><small style="font-weight:400">perfect, needs signal</small>`;
  $('batLab').textContent = (emoji?'🔋 ':'')+'BATTERY';
  $('ramLab').textContent = (emoji?'🧠 ':'')+'RAM (KV-cache)';
  $('accLab').textContent = (emoji?'🎯 ':'')+'ACCURACY';
}

/* ---- saved progress (survives between sessions via localStorage) ---- */
const SAVE_KEY = 'edgeRush.v2';
let PROG = { unlocked:0, best:0 };   // unlocked = furthest lesson index reached
function loadProg(){
  try{ const s=JSON.parse(localStorage.getItem(SAVE_KEY)); if(s) PROG={unlocked:s.unlocked|0, best:s.best|0}; }
  catch(e){ /* storage blocked (e.g. some file:// setups): game still works, just won't remember */ }
}
function saveProg(){
  try{ localStorage.setItem(SAVE_KEY, JSON.stringify(PROG)); }catch(e){}
}
function recordProgress(){
  PROG.unlocked = Math.max(PROG.unlocked, G.stageIdx);
  PROG.best = Math.max(PROG.best, G.score);
  saveProg();
}

const TYPES = [
  {name:'CHAT',icon:'💬'},{name:'TRANSLATE',icon:'🌐'},{name:'MATH',icon:'🧮'},
  {name:'VISION',icon:'👁️'},{name:'VOICE',icon:'🎙️'},
];

/* architecture presets for the STAR capstone (Lesson 6) */
const ARCHS = {
  conv: {label:'Mostly FAST',      ramCap:60,  batMul:0.8, decayMul:1.4},
  bal:  {label:'Balanced (LFM2)',  ramCap:100, batMul:1.0, decayMul:1.0},
  attn: {label:'Mostly ATTENTION', ramCap:135, batMul:1.7, decayMul:0.65},
};
const DEFAULT_ARCH = {label:'', ramCap:100, batMul:1.0, decayMul:1.0};

/* ================= stages (the curriculum) ================= */
const STAGES = [
  {
    device:'📱 Phone',
    flags:{conv:true, attn:false, nano:false, cloud:true, ram:false, battery:false, tunnel:false, archChoice:false},
    goal:6, baseDecay:0.04, pLong:0, pComplex:0,
    keys:'<span class="kbd" style="background:var(--conv)">1</span> FAST (on-device) · <span class="kbd" style="background:var(--cloud)">4</span> cloud',
    intro:`<h2>Lesson 1: Where does AI run?</h2>
      <div class="body">
      <p class="lead">Every AI request has to be computed <i>somewhere</i>. There are two places:</p>
      <p>☁️ <b>CLOUD</b>: a giant computer far away. Very smart, but slow, and it needs an internet connection.</p>
      <p>⚡ <b>ON-DEVICE</b> (the <b>FAST</b> button): a tiny AI brain right inside your gadget. Instant, and your data never leaves. <span class="muted">(Engineers call this little block a "convolution"; you'll meet that word again at the end.)</span></p>
      <p>Requests appear at the bottom. Send each one to <b>FAST</b> (on-device) or <b>CLOUD</b>.</p>
      <p class="muted">💡 Tip: for easy requests, the tiny on-device block is the smart, fast choice, with no need to bother the cloud.</p>
      </div>`,
    done:`<h2>✅ Lesson 1 complete</h2>
      <div class="body"><p>Easy requests don't need the cloud at all. A tiny block on your device handles them instantly and privately.</p>
      <p class="muted">This is Liquid AI's whole bet: do the everyday work right on the device. But what about <b>hard</b> requests?</p></div>`
  },
  {
    device:'📱 Phone',
    flags:{conv:true, attn:true, nano:false, cloud:true, ram:true, battery:false, tunnel:false, archChoice:false},
    goal:8, baseDecay:0.05, pLong:0.35, pComplex:0.3,
    keys:'<span class="kbd" style="background:var(--conv)">1</span> FAST · <span class="kbd" style="background:var(--attn)">2</span> ATTENTION · <span class="kbd" style="background:var(--cloud)">4</span> CLOUD',
    intro:`<h2>Lesson 2: Hard requests, and attention remembers</h2>
      <div class="body">
      <p>Watch the tags on each request:</p>
      <p>&bull; <b style="color:#ffd9a0">LONG</b> = lots of text to read &nbsp;&nbsp; &bull; <b style="color:#ffb0b8">COMPLEX</b> = needs real reasoning</p>
      <p>The tiny <b style="color:var(--conv)">FAST</b> block is quick, but it only gets <b>short and simple</b> requests right. Use it on a hard one and you get a wrong answer.</p>
      <p>For hard requests, use the new <b style="color:var(--attn)">ATTENTION 🧠</b> block. It can handle anything.</p>
      <p><b>New meter: 🧠 RAM (memory).</b> Attention has to <b>remember everything it has read so far</b>. That growing memory is called the <b>KV-cache</b>. The catch: <b>the more it's already holding, the more each new attention call costs.</b> Spam it and the bar balloons.</p>
      <p class="muted">💡 Tip: the FAST block has no growing memory at all. That's exactly why Liquid's models are mostly fast blocks (about 10 of them to every 6 attention blocks).</p>
      </div>`,
    done:`<h2>✅ Lesson 2 complete</h2>
      <div class="body"><p>See the wall? ATTENTION is powerful, but its KV-cache piles up, and gets pricier the longer the conversation. Real transformer AIs (the ones behind ChatGPT) hit this exact wall on small devices.</p>
      <p class="muted">The trick that keeps Liquid AI fast: the cheap <b>FAST</b> block for most requests, <b>ATTENTION</b> only for the hard ones.</p></div>`
  },
  {
    device:'💻 Laptop',
    flags:{conv:true, attn:true, nano:false, cloud:true, ram:true, battery:true, tunnel:false, archChoice:false},
    goal:11, baseDecay:0.075, pLong:0.45, pComplex:0.4,
    keys:'<span class="kbd" style="background:var(--conv)">1</span> FAST · <span class="kbd" style="background:var(--attn)">2</span> ATTENTION · <span class="kbd" style="background:var(--cloud)">4</span> CLOUD',
    intro:`<h2>Lesson 3: Power isn't free</h2>
      <div class="body">
      <p>Real devices run on a battery. <b>New meter: 🔋 BATTERY.</b> Every choice costs energy:</p>
      <p>&bull; <b style="color:var(--conv)">FAST ⚡</b> = almost nothing<br>
         &bull; <b style="color:var(--attn)">ATTENTION 🧠</b> = a lot<br>
         &bull; <b style="color:var(--cloud)">CLOUD ☁️</b> = a lot (sending your data far away is expensive)</p>
      <p>If the battery hits 0%, the device dies. Pick the <b>cheapest block that still gets it right.</b></p>
      <p class="muted">💡 Tip: this is what Liquid means by <b>"efficiency by design"</b>, the most work for the least power, instead of squeezing a giant cloud model down to fit.</p>
      </div>`,
    done:`<h2>✅ Lesson 3 complete</h2>
      <div class="body"><p>That's the real job of an AI chip: the best answer, using the least memory and the least battery.</p>
      <p class="muted">Next: what happens when the cloud isn't even reachable?</p></div>`
  },
  {
    device:'🚗 Car',
    flags:{conv:true, attn:true, nano:false, cloud:true, ram:true, battery:true, tunnel:true, archChoice:false},
    goal:13, baseDecay:0.085, pLong:0.5, pComplex:0.45,
    keys:'<span class="kbd" style="background:var(--conv)">1</span> FAST · <span class="kbd" style="background:var(--attn)">2</span> ATTENTION · <span class="kbd" style="background:var(--cloud)">4</span> CLOUD',
    intro:`<h2>Lesson 4: You're now the AI in a car 🚗</h2>
      <div class="body">
      <p>Sometimes the car drives into a <b style="color:#ffb0b8">TUNNEL</b> and loses signal. When that happens, the <b style="color:var(--cloud)">CLOUD ☁️</b> stops working completely, and the button goes dark.</p>
      <p>If your AI lived <i>only</i> in the cloud, it would go silent mid-drive. Not good for a car.</p>
      <p>Your on-device blocks (<b style="color:var(--conv)">FAST</b> and <b style="color:var(--attn)">ATTENTION</b>) keep working no matter what.</p>
      <p class="muted">💡 Tip: this is the real reason Mercedes-Benz is putting Liquid's models <i>inside</i> the car. A safety feature can't depend on the cloud.</p>
      </div>`,
    done:`<h2>✅ Lesson 4 complete</h2>
      <div class="body"><p>On-device AI keeps working in the tunnel, the dead zone, the basement, anywhere.</p>
      <p class="muted">Now a different idea: what if a model did just <b>one</b> thing, but did it perfectly?</p></div>`
  },
  {
    device:'🛍️ Shopify',
    flags:{conv:true, attn:true, nano:true, cloud:true, ram:true, battery:true, tunnel:false, archChoice:false},
    goal:12, baseDecay:0.085, pLong:0.45, pComplex:0.4,
    keys:'<span class="kbd" style="background:var(--conv)">1</span> FAST · <span class="kbd" style="background:var(--attn)">2</span> ATTN · <span class="kbd" style="background:var(--nano)">3</span> NANO · <span class="kbd" style="background:var(--cloud)">4</span> CLOUD',
    intro:`<h2>Lesson 5: Specialists (Liquid Nanos)</h2>
      <div class="body">
      <p>Instead of one big model that does everything <i>okay</i>, you can load a tiny model that does <b>one job perfectly</b>. That's a <b style="color:var(--nano)">NANO 🎯</b>.</p>
      <p>This round, one request type is the <b>loaded specialist</b> (shown above the queue). For <b>that</b> type, NANO is the best pick of all: cheap, no growing cache, and it nails it.</p>
      <p>But a NANO knows nothing else. Use it on any other type and it fails.</p>
      <p class="muted">💡 Note: Liquid ships a roughly 350 MB model just for translation that matches GPT-4o <i>on translation</i>, at a fraction of the size. Shopify and Insilico Medicine run these specialists in production.</p>
      </div>`,
    done:`<h2>✅ Lesson 5 complete</h2>
      <div class="body"><p>A swarm of tiny specialists can beat one giant generalist, each one fast, cheap, and private.</p>
      <p class="muted">Last lesson: you get to <b>design the chip itself</b>.</p></div>`
  },
  {
    device:'🏎️ Custom silicon',
    flags:{conv:true, attn:true, nano:true, cloud:true, ram:true, battery:true, tunnel:true, archChoice:true},
    goal:18, baseDecay:0.1, pLong:0.5, pComplex:0.45,
    keys:'<span class="kbd" style="background:var(--conv)">1</span> FAST · <span class="kbd" style="background:var(--attn)">2</span> ATTN · <span class="kbd" style="background:var(--nano)">3</span> NANO · <span class="kbd" style="background:var(--cloud)">4</span> CLOUD',
    intro:`<h2>Lesson 6: Design your chip (STAR) 🔧</h2>
      <div class="body">
      <p>Liquid doesn't hand-pick its architecture. A system called <b>STAR</b> automatically searches thousands of designs <i>on the real target hardware</i> and evolves toward the best speed, memory, and accuracy trade-off.</p>
      <p>Your turn: pick how to build your model. Then survive the fast final round. Everything is on: hard requests, ballooning attention, a specialist, tunnels, battery.</p>
      <p class="muted">💡 Tip: watch which build feels best. STAR tends to converge on the <b>balanced hybrid</b>, and so will you.</p>
      </div>`,
    done:null // victory handled separately
  }
];

/* ================= state ================= */
let G;
function makeState(idx){
  return { stageIdx:idx||0, score:0, served:0, servedInStage:0, queue:[], running:false,
    battery:100, ram:0, ctx:0, acc:100, offline:0, offTimer:7, cloudCooldown:0, last:0,
    nanoType:null, arch:DEFAULT_ARCH, mix:{conv:0, attn:0, nano:0, cloud:0} };
}

function newReq(){
  const st = STAGES[G.stageIdx];
  const ramp = clamp(G.servedInStage/st.goal,0,1);
  const t = TYPES[Math.floor(Math.random()*TYPES.length)];
  const long    = Math.random() < st.pLong;
  const complex = Math.random() < st.pComplex;
  return { t, long, complex, life:1,
    decay: st.baseDecay + ramp*0.04 + Math.random()*0.02, el:null };
}

function pushReq(){
  const r = newReq();
  const isSpec = G.nanoType && STAGES[G.stageIdx].flags.nano && r.t.name===G.nanoType.name;
  const el = document.createElement('div');
  el.className='req';
  el.innerHTML = `
    <div class="top"><span class="type">${r.t.icon} ${r.t.name}</span><span class="muted">#${G.served+G.queue.length+1}</span></div>
    <div class="tags">
      <span class="chip ${r.long?'long':''}">${r.long?'LONG':'short'}</span>
      <span class="chip ${r.complex?'complex':''}">${r.complex?'COMPLEX':'simple'}</span>
      ${isSpec?'<span class="chip spec">🎯 specialist</span>':''}
    </div>
    <div class="timer"><i></i></div>`;
  r.el = el; r.bar = el.querySelector('.timer > i');
  stageEl.appendChild(el);
  G.queue.push(r);
}

function layout(){
  const base = $('stage').clientHeight - 95;   // keep the active card near the buttons
  G.queue.forEach((r,i)=>{
    r.el.style.top = (base - i*64)+'px';
    r.el.style.opacity = i===0?1:(i<3?0.5-(i-1)*0.12:0);
    r.el.style.filter = i===0?'none':'blur(.4px)';
    r.el.style.zIndex = 50-i;
  });
}

function float(txt,color){
  const f=document.createElement('div'); f.className='float';
  f.textContent=txt; f.style.color=color;
  f.style.left=(30+Math.random()*40)+'%'; f.style.bottom='90px';
  floats.appendChild(f); setTimeout(()=>f.remove(),1000);
}

function pulseRam(){
  const m=$('ramMeter'); m.classList.remove('pulse'); void m.offsetWidth; m.classList.add('pulse');
}

/* ================= routing ================= */
function route(kind){
  if(!G.running) return;
  const st = STAGES[G.stageIdx], f = st.flags, r = G.queue[0];
  if(!r) return;
  if(kind==='attn' && !f.attn) return;
  if(kind==='nano' && !f.nano) return;

  let ok=true, dBat=0, msg='', col='';
  const cap = G.arch.ramCap;

  if(kind==='conv'){
    dBat=0.6;
    ok = (!r.long && !r.complex);
    if(ok){ G.score+=15; msg='+15 efficient ✓'; col='var(--conv)'; }
    else { msg='✗ too hard for FAST, use ATTENTION'; col='var(--bad)'; }
  }
  else if(kind==='attn'){
    dBat=2.2;
    // KV-cache balloons: each call adds tokens, and its RAM cost rises with how much is already cached.
    const tokens = r.long?40:15;
    const kvAdd  = (r.long?14:8) * (1 + G.ram/cap);   // quadratic feel: marginal cost grows with the cache
    if(f.ram){ G.ram = clamp(G.ram + kvAdd, 0, cap); G.ctx += tokens; pulseRam(); }
    const wasteful = (!r.long && !r.complex);
    G.score += wasteful?5:18;
    msg = wasteful?'+5 overkill, FAST was enough':'+18 handled it ✓';
    col = wasteful?'var(--attn)':'var(--conv)';
  }
  else if(kind==='nano'){
    dBat=0.7;
    ok = (G.nanoType && r.t.name===G.nanoType.name);
    if(ok){ G.score+=22; msg='+22 specialist nails it ✓'; col='var(--nano)'; }
    else { msg='✗ nano only knows '+(G.nanoType?G.nanoType.name:'one task'); col='var(--bad)'; }
  }
  else if(kind==='cloud'){
    if(f.tunnel && G.offline>0){ float('✗ NO SIGNAL','var(--bad)'); return; }
    dBat=1.4; G.cloudCooldown=0.9;
    G.score+=8; msg='+8 cloud (slow)'; col='var(--cloud)';
  }

  if(f.battery) G.battery = clamp(G.battery - dBat*G.arch.batMul, 0, 100);
  G.acc = clamp(G.acc + (ok?1.2:-9), 0, 100);
  G.mix[kind]++;

  float(msg,col);
  r.el.remove(); G.queue.shift(); G.served++; G.servedInStage++;
  pushReq(); layout();

  if(f.ram && G.ram>=cap)
    end('💥 RAM OVERFLOW','The KV-cache (attention\'s memory) filled all the RAM. This is the wall a pure transformer (the standard AI design, like ChatGPT) hits on a small device: its memory grows with every token. Lean on the FAST block more.');
  else
    checkStageDone();
}

/* ================= loop ================= */
function tick(now){
  if(!G.running) return;
  const dt = Math.min(0.05,(now-G.last)/1000); G.last=now;
  const st = STAGES[G.stageIdx], f = st.flags;

  if(f.tunnel){
    G.offTimer -= dt;
    if(G.offline>0){ G.offline-=dt; if(G.offline<=0) banner(false); }
    else if(G.offTimer<=0){ G.offline=2.4+Math.random()*2; G.offTimer=8+Math.random()*7; banner(true); }
  }
  if(G.cloudCooldown>0) G.cloudCooldown-=dt;
  if(f.ram){ G.ram = clamp(G.ram - 5.5*G.arch.decayMul*dt, 0, G.arch.ramCap);
             G.ctx = clamp(G.ctx - 22*G.arch.decayMul*dt, 0, 999999); }
  if(f.battery) G.battery = clamp(G.battery-0.3*dt,0,100);

  const r = G.queue[0];
  if(r){
    r.life -= r.decay*dt;
    r.bar.style.width = clamp(r.life*100,0,100)+'%';
    r.bar.style.background = r.life<0.3?'var(--bad)':'var(--cloud)';
    if(r.life<=0){
      G.acc = clamp(G.acc-12,0,100);
      float('✗ too slow','var(--bad)');
      r.el.remove(); G.queue.shift(); G.served++; pushReq(); layout();
    }
  }

  if(f.battery && G.battery<=0) return end('🔋 BATTERY DEAD','You spent the whole power budget. Cloud trips and heavy attention both drain it fast. Being efficient on-device is the entire point.');
  if(G.acc<=0) return end('🎯 ACCURACY COLLAPSED','Too many wrong or late answers. The skill is matching the right block to each request: FAST for easy, ATTENTION for hard, NANO for its specialty.');

  draw();
  requestAnimationFrame(tick);
}

function banner(on){
  let b=$('tunnelBanner');
  if(on){ if(!b){ b=document.createElement('div'); b.id='tunnelBanner'; b.className='banner';
    b.textContent='⚠ OFFLINE: no cloud (tunnel)'; $('stage').appendChild(b);} }
  else if(b) b.remove();
  $('bCloud').disabled = on;
}

function draw(){
  const cap=G.arch.ramCap;
  $('batBar').style.width=G.battery+'%'; $('batTxt').textContent=Math.round(G.battery)+'%';
  $('ramBar').style.width=(G.ram/cap*100)+'%'; $('ramTxt').textContent=Math.round(G.ctx).toLocaleString()+' tok';
  $('accBar').style.width=G.acc+'%';     $('accTxt').textContent=Math.round(G.acc)+'%';
  $('batBar').style.background = G.battery<25?'var(--bad)':'var(--good)';
  $('ramBar').style.background = G.ram>cap*0.8?'var(--bad)':'var(--attn)';
  const st=STAGES[G.stageIdx];
  $('stageInfo').textContent = `Lesson ${G.stageIdx+1}/${STAGES.length} · ${G.servedInStage}/${st.goal}`;
}

/* ================= stage flow ================= */
function applyStageUI(){
  const st=STAGES[G.stageIdx], f=st.flags;
  chromeLabels(true);
  $('device').textContent = st.device;
  $('ramMeter').classList.toggle('hide', !f.ram);
  $('batMeter').classList.toggle('hide', !f.battery);
  $('bAttn').classList.toggle('hide', !f.attn);
  $('bNano').classList.toggle('hide', !f.nano);
  $('keys').innerHTML = st.keys;
  $('bCloud').disabled = false;
  const sp=$('specialist');
  if(f.nano && G.nanoType){ sp.classList.add('show'); sp.innerHTML=`🎯 Specialist loaded: <b>${G.nanoType.icon} ${G.nanoType.name}</b>. NANO is perfect for these, useless for the rest.`; }
  else sp.classList.remove('show');
}

function startStage(){
  const st=STAGES[G.stageIdx];
  G.battery=100; G.ram=0; G.ctx=0; G.acc=100;
  G.servedInStage=0; G.queue=[]; G.offline=0; G.offTimer=7+Math.random()*5; G.cloudCooldown=0;
  if(st.flags.nano) G.nanoType = TYPES[Math.floor(Math.random()*TYPES.length)]; else G.nanoType=null;
  stageEl.innerHTML=''; floats.innerHTML=''; banner(false);
  applyStageUI();
  for(let i=0;i<4;i++) pushReq();
  layout(); draw();
  G.running=true; G.last=performance.now();
  overlay.style.display='none';
  $('help').style.display='flex';
  requestAnimationFrame(tick);
}

function openHelp(){
  if(!G || !G.running) return;
  G.running=false;
  const st=STAGES[G.stageIdx];
  show(st.intro + `<div class="row" style="justify-content:center;margin-top:14px">
    <button class="btn-conv" id="resume">Resume ▶</button></div>`);
  $('resume').onclick = ()=>{
    overlay.style.display='none'; $('help').style.display='flex';
    G.running=true; G.last=performance.now(); requestAnimationFrame(tick);
  };
}

function checkStageDone(){
  const st=STAGES[G.stageIdx];
  if(G.servedInStage < st.goal) return;
  G.running=false; banner(false);
  if(G.stageIdx >= STAGES.length-1){ return victory(); }
  show(st.done + `<div class="row" style="justify-content:center;margin-top:14px">
    <button class="btn-conv" id="next">Next lesson ▶</button></div>`);
  $('next').onclick = ()=>{ G.stageIdx++; recordProgress(); intro(); };
}

function end(title,lesson){
  G.running=false; banner(false); recordProgress();
  show(`<h2>${title}</h2>
    <div class="stat">Lesson ${G.stageIdx+1} · served ${G.servedInStage} · total score ${G.score}</div>
    <div class="body"><p class="muted">${lesson}</p></div>
    <div class="row" style="justify-content:center;margin-top:14px">
      <button class="btn-conv" id="retry">Retry this lesson</button>
      <button class="btn-cloud" id="restart">Restart from Lesson 1</button>
    </div>`);
  $('retry').onclick = ()=> STAGES[G.stageIdx].flags.archChoice ? buildScreen() : startStage();
  $('restart').onclick = ()=>{ const b=PROG.best; G=makeState(0); PROG.best=b; intro(); };
}

/* ================= architecture-mix payoff ================= */
function victory(){
  G.stageIdx = STAGES.length-1; recordProgress();
  const m=G.mix, total=m.conv+m.attn+m.nano+m.cloud || 1;
  const pc = k => Math.round(m[k]/total*100);
  const cP=pc('conv'), aP=pc('attn'), nP=pc('nano'), clP=Math.max(0,100-cP-aP-nP);
  const attnShare=m.attn/total, cloudShare=m.cloud/total;

  let verdict;
  if(cloudShare>0.35){
    verdict=`<p class="lead">☁️ <b>You leaned on the cloud.</b></p>
      <p>Great answers, right up until the tunnel. The cloud isn't there when you need it most: in a car, on a plane, in a dead zone. On-device is what keeps working.</p>`;
  } else if(attnShare>0.45){
    verdict=`<p class="lead">🧠 <b>You built a Transformer</b> (the standard ChatGPT-style design).</p>
      <p>Powerful, but look how much RAM and battery that burned. Attention's KV-cache grows with every token, which is exactly why ChatGPT-class models melt phones.</p>`;
  } else {
    verdict=`<p class="lead">⚡ <b>This is basically LFM2. Nice.</b></p>
      <p>Mostly the cheap FAST block, ATTENTION saved for the genuinely hard ones, specialists where they fit. Those fast blocks are called <b>convolutions</b>. Liquid's real models use about <b>10 of them to every 6 attention blocks</b>, so attention does only 20 to 40% of the work and the whole thing runs in under 900 MB on a phone.</p>`;
  }

  const seg=(p,c)=> p>0?`<span style="flex:${p};background:${c}">${p>=8?p+'%':''}</span>`:'';
  show(`<h2>🏆 You shipped on-device AI</h2>
    <div class="stat">Final score: <b style="color:var(--ink)">${G.score}</b>${PROG.best>G.score?` · best ${PROG.best}`:''}</div>
    <div class="muted" style="font-size:12px;margin-top:6px">How you routed every request:</div>
    <div class="mixbar">
      ${seg(cP,'var(--conv)')}${seg(aP,'var(--attn)')}${seg(nP,'var(--nano)')}${seg(clP,'var(--cloud)')}
    </div>
    <div class="mixleg">
      <span><i class="dot" style="background:var(--conv)"></i>FAST <b>${cP}%</b></span>
      <span><i class="dot" style="background:var(--attn)"></i>ATTENTION <b>${aP}%</b></span>
      <span><i class="dot" style="background:var(--nano)"></i>NANO <b>${nP}%</b></span>
      <span><i class="dot" style="background:var(--cloud)"></i>CLOUD <b>${clP}%</b></span>
    </div>
    <div class="body" style="max-width:600px">
      ${verdict}
      <p class="muted">That's the Liquid AI playbook in one screen: run on the device (instant and private), keep attention's KV-cache in check, use the cheapest block that still gets it right, and reach for the cloud only for the rare hard case. That's why the future is millions of small specialized models, not one giant brain.</p>
    </div>
    <div class="row" style="justify-content:center;margin-top:14px">
      <button class="btn-conv" id="play2">Play again ▶</button></div>`);
  $('play2').onclick = ()=>{ const b=PROG.best; G=makeState(0); PROG.best=b; intro(); };
}

function show(html){ overlay.innerHTML=html; overlay.style.display='flex'; $('help').style.display='none'; }

/* ================= intro / build flow ================= */
function intro(){
  G.running=false; banner(false);
  const st=STAGES[G.stageIdx];
  applyStageUI();
  show(st.intro + `<div class="row" style="justify-content:center;margin-top:14px">
    <button class="btn-conv" id="begin">${st.flags.archChoice?'Choose a build ▶':'Begin ▶'}</button></div>`);
  $('begin').onclick = ()=> st.flags.archChoice ? buildScreen() : startStage();
}

function buildScreen(){
  show(`<h2>🔧 STAR: synthesize your architecture</h2>
    <div class="muted" style="font-size:12.5px;max-width:560px">Pick a design, then play the final round. Notice how the trade-offs feel.</div>
    <div class="builds">
      <div class="build" data-a="conv"><h3 style="color:var(--conv)">⚡ Mostly FAST</h3>
        <p>Tiny and fast (lots of fast blocks). Battery sips, memory clears quickly, but little RAM headroom, so heavy attention overflows fast.</p></div>
      <div class="build" data-a="bal"><h3 style="color:var(--ink)">⚖️ Balanced (LFM2)</h3>
        <p>The hybrid recipe: about 10 fast blocks to 6 attention. Roomy memory, steady power. The all-rounder.</p></div>
      <div class="build" data-a="attn"><h3 style="color:var(--attn)">🧠 Mostly ATTENTION</h3>
        <p>Huge cache, handles anything, but drains battery fast and the KV-cache is slow to clear. The transformer way.</p></div>
    </div>
    <div class="muted" style="font-size:11px;margin-top:8px">Tip: STAR usually evolves toward the balanced hybrid.</div>`);
  overlay.querySelectorAll('.build').forEach(b=>{
    b.onclick=()=>{ G.arch=ARCHS[b.dataset.a]; startStage(); };
  });
}

/* ================= boot ================= */
function boot(){
  loadProg();
  G = makeState(0);
  chromeLabels(false);            // title screen stays emoji-free
  $('device').textContent = 'Phone';
  $('ramMeter').classList.add('hide'); $('batMeter').classList.add('hide');
  $('specialist').classList.remove('show'); $('stageInfo').textContent='';

  const canContinue = PROG.unlocked > 0;
  const contBtn = canContinue
    ? `<button class="btn-cloud" id="continue">Continue: Lesson ${Math.min(PROG.unlocked,STAGES.length-1)+1}</button>` : '';
  const bestLine = PROG.best > 0
    ? `<p class="muted" style="text-align:center">Best score: <b>${PROG.best}</b>${canContinue?` · progress saved on this device`:''}</p>` : '';
  const resetLink = canContinue
    ? `<p class="muted" style="text-align:center;margin-top:8px"><a href="#" id="reset">reset progress</a></p>` : '';

  show(`<h2>EDGE RUSH</h2>
    <div class="body" style="max-width:520px">
      <p class="lead">A tiny game about how AI runs on your phone, car, and glasses. No experience needed.</p>
      <p><b>Liquid AI</b> is a company that builds AI which runs <i>directly on your devices</i>, instead of in a faraway data center. This game shows why that's clever.</p>
      <p class="muted">You play as the AI chip. We teach one idea at a time across 6 short lessons. Use the number keys <span class="kbd" style="background:var(--ink)">1</span> <span class="kbd" style="background:var(--ink)">2</span> <span class="kbd" style="background:var(--ink)">3</span> <span class="kbd" style="background:var(--ink)">4</span> or click the buttons.</p>
      <p class="learn"><b>What you'll learn, lesson by lesson:</b> where AI runs (your device vs. the cloud); why attention is smart but its memory, the KV-cache, keeps growing; how to spend limited power on the cheapest block that still works; why on-device AI keeps working with no signal; how tiny specialist models can beat one big generalist; and how a balanced mix of blocks wins, which is exactly how Liquid builds its LFM2 models.</p>
    </div>
    ${bestLine}
    <div class="row" style="justify-content:center;margin-top:14px">
      ${contBtn}
      <button class="btn-conv" id="start">${canContinue?'Start over: Lesson 1':'Start Lesson 1'}</button>
    </div>
    ${resetLink}`);
  $('start').onclick = ()=>{ const b=PROG.best; G=makeState(0); PROG.best=b; intro(); };
  if(canContinue){
    $('continue').onclick = ()=>{ const b=PROG.best; G=makeState(Math.min(PROG.unlocked,STAGES.length-1)); PROG.best=b; intro(); };
    $('reset').onclick = (e)=>{ e.preventDefault(); PROG={unlocked:0,best:0}; saveProg(); boot(); };
  }
}

$('help').onclick = openHelp;
$('bConv').onclick = ()=>route('conv');
$('bAttn').onclick = ()=>route('attn');
$('bNano').onclick = ()=>route('nano');
$('bCloud').onclick= ()=>route('cloud');
addEventListener('keydown',e=>{
  if(e.key==='1') route('conv');
  else if(e.key==='2') route('attn');
  else if(e.key==='3') route('nano');
  else if(e.key==='4') route('cloud');
});

boot();
</script>
</body>
</html>
